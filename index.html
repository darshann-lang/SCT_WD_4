<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Tasker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-card">
        <div class="app-header">
            <h2>Focus List</h2>
            <p id="live-clock"></p>
        </div>

        <div class="entry-box">
            <input type="text" id="taskInput" placeholder="Write a new task...">
            <div class="row">
                <input type="datetime-local" id="taskDate">
                <button id="addBtn">Save Task</button>
            </div>
        </div>

        <ul id="listContainer">
            </ul>

        <div class="footer">
            <button id="clearAll" class="secondary-btn">Clear All</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
